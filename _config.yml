title: Lee's Nest
tagline: 기록하고, 배우고, 나눕니다
description: >-
  생각과 배움을 기록하는 개인 블로그입니다.
author:
  name: ichiwon
  email: lwbvvbusiness@gmail.com
lang: ko-KR
timezone: Asia/Seoul

# 운영 도메인. baseurl은 비워두고(로컬 개발 편의),
# GitHub Actions 빌드 시 --baseurl "/blog" 로 자동 주입됩니다.
url: "https://lwbvv.github.io"
baseurl: ""

# Build
permalink: /:year/:month/:day/:title/
paginate: 5
paginate_path: "/page:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# 댓글 (Giscus — GitHub Discussions 기반)
# 아래 값을 채우면 글 하단에 댓글창이 나타납니다.
# 설정 방법: https://giscus.app 에서 저장소를 입력하면 repo-id / category-id를 알려줍니다.
comments:
  enabled: true
  repo: "lwbvv/blog"
  repo_id: "R_kgDOSxq8Zg"
  category: "Announcements"
  category_id: "DIC_kwDOSxq8Zs4C-i53"
  mapping: "pathname"
  theme: "light"
  lang: "ko"

# 글 기본값
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .sass-cache
  - .jekyll-cache

sass:
  style: compressed
