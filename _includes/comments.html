{% if site.comments.enabled and site.comments.repo != "" %}
<section class="comments">
  <h2>댓글</h2>
  <script src="https://giscus.app/client.js"
          data-repo="{{ site.comments.repo }}"
          data-repo-id="{{ site.comments.repo_id }}"
          data-category="{{ site.comments.category }}"
          data-category-id="{{ site.comments.category_id }}"
          data-mapping="{{ site.comments.mapping | default: 'pathname' }}"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="top"
          data-theme="{{ site.comments.theme | default: 'light' }}"
          data-lang="{{ site.comments.lang | default: 'ko' }}"
          crossorigin="anonymous"
          async>
  </script>
</section>
{% endif %}
